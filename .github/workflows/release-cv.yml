name: Release CV PDF

on:
  push:
    branches:
      - main
    paths:
      - "**/*.tex"
      - "**/*.html"
      - ".github/workflows/release-cv.yml"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate CV updated stamp
        run: |
          ts_compact=$(TZ=Europe/Paris date +"%Y%m%d-%H%M%S")
          ts_human=$(TZ=Europe/Paris date +"%d/%m/%Y %H:%M")
          echo "\\newcommand{\\cvupdated}{${ts_human} (heure de Paris)}" > cv_updated.inc

      - name: Build LaTeX PDFs
        uses: xu-cheng/latex-action@v3
        with:
          root_file: |
            *.tex
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -halt-on-error

      - name: Build HTML PDFs with WeasyPrint
        run: |
          pip install weasyprint --quiet
          for f in *.html; do
            [ -f "$f" ] || continue
            out="${f%.html}.pdf"
            echo "Converting $f → $out"
            python3 -m weasyprint "$f" "$out"
          done

      - name: Set release metadata
        id: meta
        run: |
          short_sha=${GITHUB_SHA::7}
          ts_compact=$(TZ=Europe/Paris date +"%Y%m%d-%H%M%S")
          ts_human=$(TZ=Europe/Paris date +"%d/%m/%Y %H:%M")
          tag="cv-${ts_compact}-${short_sha}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "name=CV UPDATED: ${ts_human} (Paris time)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          files: "*.pdf"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}